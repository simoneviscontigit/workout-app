<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#09090b;color:#fafafa;font-family:"Space Grotesk",-apple-system,system-ui,sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;letter-spacing:-.01em;max-width:440px;margin:0 auto;min-height:100vh;overscroll-behavior:contain}
.btn,.lbl,.font-display{font-family:"Space Grotesk",sans-serif}
.lbl{letter-spacing:2px}
.pg{padding:18px;min-height:100vh;padding-bottom:90px}
.card{background:linear-gradient(180deg,#212126,#161619);border:1px solid #30303a;border-radius:18px;padding:15px;margin-bottom:11px;box-shadow:0 1px 2px rgba(0,0,0,.35),0 14px 30px -16px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.04)}
.lbl{color:#52525b;font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:700}
.btn{display:block;width:100%;border:none;border-radius:16px;padding:16px;font-size:16px;font-weight:900;cursor:pointer;color:#fff;margin-bottom:8px;text-align:center;transition:transform .15s cubic-bezier(.2,.8,.2,1),filter .15s,box-shadow .15s;box-shadow:0 10px 26px -8px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.22);letter-spacing:.02em}
.btn:active{filter:brightness(1.08)}
.btn-ghost{display:block;width:100%;background:transparent;color:#71717a;border:1px solid #27272a;border-radius:12px;padding:12px;font-size:13px;cursor:pointer;margin-bottom:8px}
.back{background:#27272a;border:none;border-radius:10px;padding:9px 14px;color:#a1a1aa;font-size:13px;cursor:pointer}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.pb{height:3px;background:#27272a;border-radius:99px}
.pbf{height:3px;border-radius:99px;transition:width .4s}
.opt{background:#18181b;border:1px solid #27272a;border-radius:12px;padding:13px 16px;color:#d4d4d8;font-size:14px;cursor:pointer;text-align:left;width:100%;display:block;margin-bottom:7px}
.opt.sel{background:#3d1200;border-color:#f97316;color:#fafafa}
.hdr{display:flex;align-items:center;margin-bottom:18px;gap:8px}
.center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}
.ex-media{width:100%;max-height:220px;object-fit:cover;border-radius:14px;display:block}
.img-fb{width:100%;height:160px;border-radius:14px;align-items:center;justify-content:center;flex-direction:column;gap:8px}
.macro-bar{height:7px;background:#27272a;border-radius:99px;overflow:hidden;margin-top:3px;margin-bottom:10px}
.mfill{height:7px;border-radius:99px}
.score-ring{width:76px;height:76px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;border:4px solid;margin:0 auto 12px}
textarea,input[type=text]{background:#18181b;border:1px solid #27272a;border-radius:12px;color:#fafafa;font-size:14px;padding:12px;width:100%;outline:none;font-family:inherit;margin-bottom:8px;resize:none}
.chat-msg{padding:10px 14px;border-radius:14px;margin-bottom:7px;font-size:13px;line-height:1.5}
.tag-core{background:#422006;border:1px solid #92400e;border-radius:7px;padding:4px 10px;display:inline-block;margin-bottom:8px;color:#fbbf24;font-size:10px;font-weight:700;letter-spacing:1px}
.tag-band{background:#1a1500;border:1px solid #ca8a0440;border-radius:10px;padding:8px 12px;margin-bottom:10px;display:flex;align-items:center;gap:6px;color:#fbbf24;font-size:13px;font-weight:600}
/* ── Floating AI ── */
.ai-fab{position:fixed;bottom:24px;right:18px;width:54px;height:54px;border-radius:50%;background:#f97316;border:none;cursor:pointer;font-size:18px;font-weight:900;letter-spacing:-.5px;box-shadow:0 4px 24px #f9731640;z-index:1000;display:flex;align-items:center;justify-content:center;color:#fff;transition:transform .15s}
.ai-fab:active{transform:scale(.92)}
.ai-slide{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(102%);width:100%;max-width:440px;background:#18181b;border-top:1px solid #f9731640;border-radius:20px 20px 0 0;z-index:999;transition:transform .28s cubic-bezier(.32,1,.45,1);display:flex;flex-direction:column;max-height:72vh}
.ai-slide.open{transform:translateX(-50%) translateY(0)}
.ai-slide-head{padding:14px 16px 10px;border-bottom:1px solid #27272a;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ai-ctx-pill{background:#27272a;border-radius:20px;padding:5px 12px;font-size:11px;color:#a1a1aa;font-weight:600;max-width:220px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.ai-slide-msgs{flex:1;overflow-y:auto;padding:12px 14px;-webkit-overflow-scrolling:touch}
.ai-slide-input{padding:12px 14px 20px;border-top:1px solid #27272a;flex-shrink:0;display:flex;gap:8px;background:#18181b}
.ai-slide-input input{margin:0;flex:1}
.ai-send-btn{background:#f97316;border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;padding:0 16px;cursor:pointer;white-space:nowrap;flex-shrink:0}
/* ── Motion + taste (emil-anim skill) ── */
.btn-ghost,.back,.ai-send-btn{transition:transform .15s cubic-bezier(.2,.8,.2,1),border-color .2s,background .2s}
.opt{transition:transform .15s cubic-bezier(.2,.8,.2,1),border-color .2s,background .2s}
.btn:active,.btn-ghost:active,.back:active,.ai-send-btn:active{transform:scale(.97)}
.opt:active{transform:scale(.985)}
.opt.sel{box-shadow:0 0 0 1px #f97316,0 8px 26px -12px #f9731685}
.tag-band{transition:transform .15s cubic-bezier(.2,.8,.2,1)}
.tag-band:active{transform:scale(.98)}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition-duration:.01ms!important}}
/* ── BRUTALISM tokens ── */
*{border-radius:0!important}
.ai-fab{border:2px solid #fafafa!important;box-shadow:none!important;font-weight:700!important}
.ex-media{border:2px solid #27272a}
.card{border-radius:0;border:2px solid #27272a;background:#0e0e11;box-shadow:none}
.btn{border-radius:0;text-transform:uppercase;letter-spacing:.05em;box-shadow:none;font-weight:700}
.btn-ghost,.back,.opt{border-radius:0}
.opt{border-width:2px}
.lbl{text-transform:uppercase}
.marq-wrap{overflow:hidden;white-space:nowrap;background:#F97316;color:#000}
.marq{display:inline-block;padding:7px 0;font-weight:700;font-size:13px;letter-spacing:1px;text-transform:uppercase;animation:marq 18s linear infinite}
@keyframes marq{from{transform:translateX(0)}to{transform:translateX(-50%)}}
</style>
</head>

function applyAdaptation(ex){
 var a=S.aiDB.adaptation||{};
 var mult=a.repsMultiplier||1;
 var setsAdj=a.setsAdjustment||0;
 // Adatta in base ai muscoli indolenziti dichiarati nel check pre-workout
 var preAns=S.preWQAns||{};
 var doms=preAns.domsActual||1;
 var sore=preAns.soreMuscles||[];
 if(doms>=3&&sore.length>0&&ex.muscles){
  var exMusclesLow=(ex.muscles||'').toLowerCase();
  var hasSore=sore.some(function(m){return exMusclesLow.indexOf(m.toLowerCase())>=0;});
  if(hasSore){
   setsAdj=setsAdj-1; // sempre -1 set per muscoli indolenziti
   if(doms>=4)mult=Math.min(mult,0.8); // DOMS forte: anche -20% reps
  }
 }
 if(mult===1&&setsAdj===0)return ex;
 var newEx=Object.assign({},ex);
 if(ex.isTime){
  newEx.time=Math.max(10,Math.round((ex.time||30)*mult));
 } else {
  newEx.reps=Math.max(5,Math.round((ex.reps||8)*mult));
  if(ex.repsMax) newEx.repsMax=Math.max(newEx.reps+1,Math.round((ex.repsMax)*mult));
 }
 newEx.sets=Math.max(2,(ex.sets||3)+setsAdj);
 return newEx;
}

function nextBandStep(band){
 // Elastici: alza di 5kg (la banda più piccola) ogni numero nel range
 if(!band)return band;
 return band.replace(/\d+/g,function(m){return String(parseInt(m,10)+5);});
}
function withCoachOverride(e){
 // Precedenza: coachPlan (Sumi) > progression (regola meccanica) > carico reale (chat/manuale) > DB
 var cp=(S.aiDB.coachPlan&&S.aiDB.coachPlan.perExercise&&S.aiDB.coachPlan.perExercise[e.id]);
 var pr=(S.aiDB.progression&&S.aiDB.progression[e.id]);
 var o=cp||pr;
 var ov={};
 if(o){
  if(o.band)ov.band=o.band;
  if(o.reps)ov.reps=o.reps;
  if(o.repsMax)ov.repsMax=o.repsMax;
  if(o.sets)ov.sets=o.sets;
  if(o.restSec)ov.restSec=o.restSec;
  ov.coachNote=o.note||'';
  ov.coachSrc=cp?'sumi':'mech';
 }
 // Nessuna band dal coach? Usa il tuo carico reale (chat o impostato a mano) al posto del range generico
 if(!ov.band){
  var ld=S.aiDB.loads&&S.aiDB.loads[e.id];
  if(ld&&(ld.kg||ld.kg===0)){
   ov.band=(''+ld.kg).replace(/kg/i,'')+'kg';
   if(!ov.coachNote){ov.coachNote='tuo carico'+(ld.manual?'':' (da chat)')+' · '+(ld.date||'');ov.coachSrc='mech';}
  }
 }
 if(!o&&!ov.band)return e;
 return Object.assign({},e,ov);
}
function computeProgression(session){
 // Doppia progressione dalle reps loggate per-serie. Sincrona, offline.
 try{
  var reps=session.reps||{};
  if(!S.aiDB.progression)S.aiDB.progression={};
  Object.keys(reps).forEach(function(id){
   var r=reps[id];if(!r||!r.reps||!r.reps.length)return;
   var sets=r.reps,max=r.max||r.target||8,target=r.target||8,nSets=sets.length;
   var allTop=sets.every(function(x){return x>=max;});
   var allBelow=sets.every(function(x){return x<target;});
   var cur=(S.aiDB.progression[id]&&S.aiDB.progression[id].band)||r.band||'';
   var entry={name:r.name,date:new Date().toISOString().split('T')[0],lastReps:sets};
   if(allTop&&nSets>=2){
    entry.band=nextBandStep(cur);
    entry.note=(cur?'+5kg: ':'progredisci (variante più dura): ')+'chiuso il max ('+sets.join(',')+')';
   } else if(allBelow&&nSets>=2){
    entry.band=cur;entry.note='Sotto target ('+sets.join(',')+') — mantieni e consolida';
   } else {
    entry.band=cur;entry.note='In progressione ('+sets.join(',')+') — punta a chiudere il range';
   }
   S.aiDB.progression[id]=Object.assign({},S.aiDB.progression[id],entry);
  });
  sv('ai',S.aiDB);
 }catch(e){console.error('computeProgression:',e);}
}
function genWorkout(splitIdx,skipped){
 var split=PLAN[splitIdx%6];
 var adapt=S.aiDB.adaptation||{};
 var avoid=adapt.avoidExercises||[];
 var suggest=adapt.suggestExercises||[];
 var must=(split.must||[]).slice(); // esercizi sempre presenti (es. bicipiti garantiti sui pull day)
 var exercises=[],used=[];
 Object.entries(split.cats).forEach(function(entry){
  var cat=entry[0],count=entry[1];
  // "must" di questa categoria forzati per primi (rispettano skipped/avoid), contano nel count
  var forced=[];
  must.forEach(function(id){
   if(forced.length>=count)return;
   var e=(DB[cat]||[]).find(function(x){return x.id===id;});
   if(e&&!skipped.includes(id)&&!avoid.includes(id)&&!used.includes(id))forced.push(e);
  });
  var notForced=function(e){return !forced.find(function(p){return p.id===e.id;});};
  var preferred=DB[cat].filter(function(e){return suggest.includes(e.id)&&!skipped.includes(e.id)&&!avoid.includes(e.id)&&!used.includes(e.id)&&notForced(e);});
  var pool=DB[cat].filter(function(e){return !skipped.includes(e.id)&&!avoid.includes(e.id)&&!used.includes(e.id)&&!preferred.find(function(p){return p.id===e.id;})&&notForced(e);});
  var sel=forced.concat(preferred.concat(shuf(pool)).slice(0,Math.max(0,count-forced.length)));
  sel.forEach(function(e){exercises.push(applyAdaptation(withCoachOverride(e)));used.push(e.id);});
 });
 // Scegli un circuito core casuale e costruisci la sequenza
 var circuit=DB.coreCircuits[splitIdx%DB.coreCircuits.length]; // ruota per giorno → varietà settimanale
 var coreById={};DB.core.forEach(function(e){coreById[e.id]=e;});
 var core=circuit.seq.map(function(id,idx){
  if(id==='B') return {id:'brk'+idx,cat:'core',name:'RIPOSO',desc:'Respira. Prossimo blocco tra poco.',muscles:'',isBreak:true,isCore:true,isTime:true,time:30,sets:1};
  var e=coreById[id];
  if(!e)return null;
  var adapted=applyAdaptation(Object.assign({},e,{isCore:true,isTime:true,sets:1}));
  return adapted;
 }).filter(Boolean);
 return{split:split,all:exercises.concat(core),circuit:circuit};
}
function buildSteps(all){
 var s=[];
 var coreIntroAdded=false;
 all.forEach(function(ex,ei){
  if(ex.isCore){
   // Inserisci schermata intro + countdown 10s prima del primo esercizio core
   if(!coreIntroAdded){
    coreIntroAdded=true;
    s.push({type:'core_intro'});
    s.push({type:'rest',dur:10,isCoreEntry:true,nextName:''});
   }
   // Circuito core: flusso automatico
   if(ex.isBreak){
    // Pausa 30s — step di rest speciale
    s.push({type:'rest',dur:30,isCoreBreak:true,nextName:all[ei+1]?all[ei+1].name:''});
   } else {
    s.push({type:'work',ex:ex,exIdx:ei,setNum:1,totalSets:1});
    if(ei<all.length-1&&!all[ei+1].isBreak){
     // 8s transizione verso prossimo esercizio
     s.push({type:'rest',dur:8,isTransition:true,nextName:all[ei+1]?all[ei+1].name:''});
    } else if(ei<all.length-1&&all[ei+1].isBreak){
     // nessuna transizione — la pausa è subito dopo
    }
   }
  } else {
   var ts=ex.sets||3;
   for(var i=1;i<=ts;i++){
    s.push({type:'work',ex:ex,exIdx:ei,setNum:i,totalSets:ts});
    if(i<ts) s.push({type:'rest',dur:(ex.restSec||90),isSetRest:true,nextName:ex.name,nextBand:ex.band||null});
    else if(ei<all.length-1) s.push({type:'rest',dur:60,isSetRest:false,nextName:all[ei+1].name,nextBand:all[ei+1].band||null});
   }
  }
 });
 return s;
}
function calcPatterns(){

 return{
  totalSessions:sess.length,
  avgEnergy:avg(wq,'energy'),avgDifficulty:avg(wq,'difficulty'),
  recentEnergy:avg(wq.slice(-5),'energy'),recentDifficulty:avg(wq.slice(-5),'difficulty'),
  splitHistory:sess.slice(-6).map(function(s){return s.split&&s.split.id;}),
  skippedExercises:S.skipped.slice(),
 };
}

async function restoreFromDrive(){

 if(btn){btn.textContent='Scaricando...';btn.disabled=true;}
 try{
  var r=await fetch(DRIVE_URL+'?t='+Date.now(),{redirect:'follow',cache:'no-store'});

function getMissingNutritionDays(){
 var log=S.aiDB.nutritionLog||{};
 var missing=[];
 // Parti dalla data del primo allenamento, max 30 giorni fa
 var firstSession=(S.history||[])[0];
 var firstDate=firstSession&&firstSession.date?firstSession.date.split('T')[0]:null;
 var today=new Date().toISOString().split('T')[0];
 var yesterday=new Date(Date.now()-86400000).toISOString().split('T')[0];
 var maxBack=new Date(Date.now()-7*86400000).toISOString().split('T')[0];
 // Parti al massimo da ieri (non 30 giorni fa): se c'è storia recente usa quella
 var startDate=(firstDate&&firstDate>yesterday)?firstDate:yesterday;
 var yesterday=new Date(Date.now()-86400000).toISOString().split('T')[0];
 for(var d=new Date(startDate);d.toISOString().split('T')[0]<=yesterday;d.setDate(d.getDate()+1)){
  var ds=d.toISOString().split('T')[0];
  if(!log[ds])missing.push(ds);
 }
 return missing;
}

async function handleNutPhotos(event){

 // Aggiungi placeholder loading per ogni file
 var startIdx=(S.nutPhotoUploads||[]).length;
 S.nutPhotoUploads=(S.nutPhotoUploads||[]).concat(files.map(function(){return{status:'loading'};}));
 render();
 for(var i=0;i<files.length;i++){
  var file=files[i];
  var idx=startIdx+i;
  try{
   var b64=await new Promise(function(res,rej){
    var fr=new FileReader();
    fr.onload=function(e){res(e.target.result.split(',')[1]);};
    fr.onerror=rej;
    fr.readAsDataURL(file);
   });
   var mt=file.type||'image/jpeg';
   var est=await estimateMealFromPhoto(b64,mt,'');
   S.nutPhotoUploads[idx]={status:'done',estimate:est};
  }catch(e){
   S.nutPhotoUploads[idx]={status:'error',error:e.message};
  }
  render();
 }
}

function startTimer(){
 clearInterval(TI);
 var step=S.wSteps[S.wStepIdx];if(!step)return;
 if(S.wAwaitReps)return; // nessun timer mentre selezioni le reps
 if(step.type==='core_intro'){return;} // nessun timer — l'utente preme PRONTO
 if(step.type==='rest'){
  S.wTimer=step.dur;
  TI=setInterval(function(){
   if(S.wPaused)return;
   S.wTimer=Math.max(0,S.wTimer-1);
   var el=document.getElementById('wt-rest');if(el)el.textContent=S.wTimer;
   if(S.wTimer<=0){clearInterval(TI);advStep();}
  },1000);
 } else {
  var ex=step.ex;
  if(ex.isCore&&ex.isTime){
   // Circuito core: auto-avanza a fine timer
   S.wTimer=ex.time;S.wElapsed=0;
   TI=setInterval(function(){
    if(S.wPaused)return;
    S.wTimer=Math.max(0,S.wTimer-1);S.wElapsed++;
    var e=document.getElementById('wt-core-timer');if(e)e.textContent=S.wTimer;
    if(S.wTimer<=0){clearInterval(TI);S.wSets++;advStep();}
   },1000);
  } else if(ex.isTime){
   S.wTimer=ex.time;S.wElapsed=0;
   TI=setInterval(function(){S.wTimer=Math.max(0,S.wTimer-1);S.wElapsed++;var e=document.getElementById('wt-timer');if(e)e.textContent=S.wTimer+'s';},1000);
  } else {
   S.wTimer=0;S.wElapsed=0;
   TI=setInterval(function(){S.wElapsed++;var e=document.getElementById('wt-elapsed');if(e)e.textContent=fmt(S.wElapsed);},1000);
  }
 }
}
function advStep(){S.wStepIdx++;if(S.wStepIdx>=S.wSteps.length){finishWorkout();return;}render();}
function workoutDone(){
 var step=S.wSteps[S.wStepIdx];var ex=step&&step.ex;
 // Esercizi a carico (a reps, non a tempo, non core): chiedi quante reps fatte
 if(ex&&!ex.isTime&&!ex.isCore&&!S.wAwaitReps){clearInterval(TI);S.wAwaitReps=true;render();return;}
 clearInterval(TI);S.wAwaitReps=false;S.wSets++;advStep();
}
function logReps(n){
 var step=S.wSteps[S.wStepIdx];var ex=step&&step.ex;
 if(ex){if(!S.wReps[ex.id])S.wReps[ex.id]={name:ex.name,target:ex.reps,max:ex.repsMax||ex.reps,band:ex.band||'',reps:[]};S.wReps[ex.id].reps.push(n);}
 S.wAwaitReps=false;S.wSets++;advStep();
}
function setLoad(id){
 // Feedback per Sumi: NON cambia la scheda al volo. Sumi lo valuta e decide il carico.
 var ex=(S.wEx||[]).find(function(x){return x.id===id;})||{};
 var cur=(S.aiDB.loads&&S.aiDB.loads[id]&&S.aiDB.loads[id].kg)||'';
 var v=prompt('Feedback a Sumi per "'+(ex.name||'')+'" — quanto hai davvero usato (es. 40). Lo valuta Sumi di notte, non cambia subito la scheda. Vuoto = togli:',cur);
 if(v===null)return;
 v=(''+v).trim();
 if(!S.aiDB.loads)S.aiDB.loads={};
 if(v===''){if(S.aiDB.loads[id])delete S.aiDB.loads[id];}
 else{
  S.aiDB.loads[id]={kg:v.replace(/kg/i,'').replace(/\s/g,''),name:ex.name,date:new Date().toISOString().split('T')[0],manual:true};

function skipRest(){clearInterval(TI);advStep();}
function pauseCore(){S.wPaused=true;var e=document.getElementById('core-pause-btn');if(e){e.textContent='▶ Riprendi';e.onclick=resumeCore;}}
function resumeCore(){S.wPaused=false;var e=document.getElementById('core-pause-btn');if(e){e.textContent='Pausa';e.onclick=pauseCore;}}
function wBack(){
 clearInterval(TI);
 var prev=S.wStepIdx-1;
 while(prev>0&&S.wSteps[prev].type!=='work')prev--;
 if(prev>=0&&S.wSteps[prev].type==='work'){S.wStepIdx=prev;S.wSets=Math.max(0,S.wSets-1);render();}

function skipExercise(){
 clearInterval(TI);var step=S.wSteps[S.wStepIdx];if(step.type!=='work')return;
 var ex=step.ex;var ns=S.skipped.concat([ex.id]);S.skipped=ns;sv('sk',ns);
 var pool=(DB[ex.cat]||[]).filter(function(e){return !ns.includes(e.id)&&!S.wEx.find(function(x){return x.id===e.id;});});
 var rep=shuf(pool)[0];
 if(rep){
  var newEx=Object.assign({},rep,{isCore:ex.isCore});
  var ne=S.wEx.slice();ne[step.exIdx]=newEx;
  S.wEx=ne;S.wSteps=buildSteps(ne);
  var fi=S.wSteps.findIndex(function(s){return s.type==='work'&&s.exIdx===step.exIdx&&s.setNum===1;});
  S.wStepIdx=Math.max(0,fi);
 } else {
  var nx=S.wSteps.findIndex(function(s,i){return i>S.wStepIdx&&s.type==='work'&&s.exIdx>step.exIdx;});
  if(nx!==-1)S.wStepIdx=nx;else{finishWorkout();return;}
 }
 render();
}
function finishWorkout(){
 clearInterval(TI);
 if(S.trialMode){S.trialMode=false;go('home');return;}
 var dur=Math.round((Date.now()-S.wStartTime)/60000)||1;
 S.pending={split:S.wSplit,exercises:S.wEx,sets:S.wSets,duration:dur,reps:S.wReps||{}};
 if(S.extraMode)S.pending.extra=true;
 S.qStep=0;S.qAns={};go('post_quiz');
}

function rExFeedback(){

 // Feedback chat già dati oggi, raggruppati per esercizio
 var chatByEx={};
 (S.aiDB.chatLog||[]).filter(function(c){return new Date(c.date).toDateString()===today&&c.reply!=='[nota post-allenamento]';}).forEach(function(c){

  chatByEx[k].push(c);
 });
 var exs=(S.pending&&S.pending.exercises)||[];
 var normalEx=exs.filter(function(e){return !e.isCore;});

function saveExFeedback(){
 var today=new Date().toISOString();
 var exs=(S.pending&&S.pending.exercises)||[];
 function saveNote(id,name){
  var el=document.getElementById('exfb-'+id);
  var val=el?el.value.trim():'';
  S.exFbAnswers[id]=val;
  if(val){
   S.aiDB.chatLog=(S.aiDB.chatLog||[]).concat([{
    date:today,contextType:'exercise',exercise:id,exerciseName:name,
    userMsg:val,reply:'[nota post-allenamento]'
   }]);
  }
 }
 exs.filter(function(e){return !e.isCore;}).forEach(function(ex){saveNote(ex.id,ex.name);});
 if(exs.some(function(e){return e.isCore;}))saveNote('core','Circuito Core');
 finishSession();
}
function pickPQ(i){
 S.qAns[PQ[S.qStep].key]=i+1;
 if(S.qStep<PQ.length-1){S.qStep++;render();}else{S.qStep=PQ.length;render();}
}
async function finishSession(){
 try{
  var session=Object.assign({},S.pending||{},{quiz:S.qAns,preCheck:S.preWQAns||{},date:new Date().toISOString()});
  S.preWQAns={};
  var isExtra=!!session.extra; // EXTRA: additiva, non fa avanzare rotazione/carichi/adattamento
  S.aiDB.sessions=(S.aiDB.sessions||[]).concat([session]);
  S.aiDB.patterns=calcPatterns();
  var nh=(S.history||[]).concat([session]);
  S.history=nh;
  if(!isExtra)S.splitIdx=(S.splitIdx||0)+1;
  await sv('wh',nh);
  if(!isExtra)await sv('si',String(S.splitIdx));
  if(!isExtra)computeProgression(session); // regola meccanica: aggiorna carichi/progressione dalle reps
  syncToDrive();
  if(!isExtra)runAdaptation(session);
 }catch(e){console.error('finishSession:',e);}
 S.extraMode=false;
 go('home');
}

function calcDayCalTarget(date){
 var p=S.aiDB.profile||{};
 var peso=p.peso||74, alt=p.altezza||182, eta=p.eta||30;
 var bmr=Math.round(10*peso+6.25*alt-5*eta+5); // Mifflin-St Jeor uomo
 var tdee=Math.round(bmr*1.375); // moderatamente attivo
 var goal=p.obiettivo||'massa';
 var goalAdj=goal==='massa'?300:goal==='definizione'?-400:goal==='ricomposizione'?100:0;
 var base=tdee+goalAdj;
 // Somma TUTTE le sessioni del giorno (allenamento + eventuale EXTRA), non solo la prima
 var sessions=(S.history||[]).filter(function(h){return h.date&&h.date.split('T')[0]===date;});
 var burned=0;
 sessions.forEach(function(s){
  var sid=(s.split&&s.split.id)||'';
  var rate=sid==='legs'?8:sid==='full'?7.5:sid==='extra'?7:7;
  burned+=Math.round((s.duration||45)*rate);
 });
 return{bmr:bmr,tdee:tdee,goalAdj:goalAdj,base:base,burned:burned,target:base+burned,goal:goal,session:sessions[0]||null,sessions:sessions};
}

function calcNutScore(a,dateOverride){

 var targetDate=dateOverride||(S.nutTarget?S.nutTarget.date:new Date(Date.now()-86400000).toISOString().split('T')[0]);
 var workout=hadWorkoutOn(targetDate);
 add(a.protein,[10,25,40,50,50],50);
 add(a.carbs,[10,25,45,50,40],50);
 add(a.fats,[10,25,50,40,25],50);
 // Calorie: giorno di allenamento → surplus è ottimale; giorno di riposo → mantenimento è ottimale
 if(workout){

 } else {
  add(a.calories,[10,50,40,20],50);
 }
 add(a.water,[10,20,30,40],40);
 add(a.sleep,[10,20,30,40],40);
 add(a.stress,[10,20,30,40],40);
 return m>0?Math.round((s/m)*100):0;
}

  +(ctx.type==='exercise'
   ?'La domanda riguarda un esercizio specifico. Rispondi con consigli tecnici precisi: forma, respiro, errori comuni, modifiche. Diretto e pratico.'
   :'È un feedback o domanda generale. Tienilo in conto per adattare i futuri allenamenti. Rispondi e conferma che hai registrato il feedback.')
  +' Rispondi in italiano, max 120 parole.'
  +' Rispondi SEMPRE con JSON valido: {"reply":"testo risposta","action":{"type":"avoid_exercise","exerciseName":"nome"} oppure null}.'
  +' action è non-null SOLO se l\'utente chiede esplicitamente di rimuovere/evitare/sostituire un esercizio specifico.';
 var baseCtx=buildCtx()+ctx.extra;
 var history=S.floatChat.slice(-6).map(function(m){return{role:m.role,content:m.content};});
 history[0]={role:'user',content:baseCtx+'\n\nDomanda/Feedback: '+history[0].content};
 try{
  var text=await callAI(history,system,400);
  var reply=text||'Errore nella risposta.';
  // Prova a parsare JSON strutturato {reply, action}
  try{
   var clean=reply.replace(/```json|```/g,'').trim();
   var parsed=JSON.parse(clean);
   if(parsed.reply){
    reply=parsed.reply;
    // Esegui azione se presente
    if(parsed.action&&parsed.action.type==='avoid_exercise'&&parsed.action.exerciseName){
     var match=findExerciseByName(parsed.action.exerciseName);
     if(match){
      var avoid=S.aiDB.adaptation.avoidExercises||[];
      if(!avoid.includes(match.id)){
       S.aiDB.adaptation.avoidExercises=avoid.concat([match.id]);
       reply+=' ✓ Ho registrato di evitare '+match.name+' nelle prossime sessioni.';
      }
     }
    }
   }
  }catch(pe){/* fallback: tratta la risposta come testo normale */}
  S.floatChat.push({role:'assistant',content:reply});
  // Save to chatLog for future adaptation
  var exStep=ctx.type==='exercise'&&S.wSteps&&S.wSteps[S.wStepIdx]?S.wSteps[S.wStepIdx]:null;
  S.aiDB.chatLog=(S.aiDB.chatLog||[]).concat([{
   date:new Date().toISOString(),
   contextType:ctx.type,
   exercise:exStep?exStep.ex.id:null,
   exerciseName:exStep?exStep.ex.name:null,
   userMsg:msg,
   reply:reply
  }]);
  // In trial mode: don't persist anything
  if(S.trialMode){S.floatLoading=false;updateFloatAI();setTimeout(function(){var el=document.getElementById('float-msgs');if(el)el.scrollTop=el.scrollHeight;},100);return;}
  // Detect and save reported load during exercise
  if(exStep){
   var detectedKg=parseLoad(msg);
   if(detectedKg){
    if(!S.aiDB.loads)S.aiDB.loads={};
    S.aiDB.loads[exStep.ex.id]={kg:detectedKg,name:exStep.ex.name,date:new Date().toISOString().split('T')[0]};
   }
  }
  // Persist floatChat so it survives panel close/reopen
  S.aiDB.currentChat={date:new Date().toDateString(),msgs:S.floatChat.slice(-30)};
  sv('ai',S.aiDB);
  syncToDrive();
 }catch(e){
  S.floatChat.push({role:'assistant',content:'Errore: '+e.message});
 }
 S.floatLoading=false;updateFloatAI();
 setTimeout(function(){var el=document.getElementById('float-msgs');if(el)el.scrollTop=el.scrollHeight;},100);
}

// ─── INIT ────────────────────────────────────────────────────────────────────
loadData().then(function(){S.qStep=0;render();checkAndGenerateSummaries();});
</script>
